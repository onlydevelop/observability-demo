spring:
  application:
    name: calculator-service

rounding-service:
  base-url: http://rounding-service:8080

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        url: http://otel-collector:4318/v1/metrics
  opentelemetry:
    logging:
      export:
        otlp:
          endpoint: http://otel-collector:4318/v1/logs
    tracing:
      export:
        otlp:
          endpoint: http://otel-collector:4318/v1/traces
